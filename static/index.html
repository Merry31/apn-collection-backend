<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APN Collection Manager</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <!-- FontAwesome Hooks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/styles.css">



<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="app-container">
        <header class="glass-header">
            <div class="header-content">
                <div class="logo">
                    <i class="fa-solid fa-camera-retro"></i>
                    <h1>APN <span>Vault</span></h1>
                </div>
                <div class="header-actions" style="display: flex; gap: 10px; align-items: center;">
                    <div id="user-info" class="user-info hidden"
                        style="color: var(--text); font-size: 0.9rem; font-weight: 500;"></div>
                    <button class="btn-secondary" id="btn-auth">
                        <i class="fa-solid fa-right-to-bracket"></i> <span id="auth-btn-text">Sign In</span>
                    </button>
                    <button class="btn-primary hidden" id="btn-add-camera">
                        <i class="fa-solid fa-plus"></i> New Camera
                    </button>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="cameras-grid" id="cameras-grid">
                <!-- Camera cards will be injected here via JS -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading your collection...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Camera Modal -->
    <div class="modal-overlay" id="camera-modal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2 id="modal-title">Add New Camera</h2>
                <button class="btn-close" id="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="camera-form">
                    <input type="hidden" id="camera-id">

                    <div class="form-row">
                        <div class="input-group">
                            <label for="brand">Brand *</label>
                            <input type="text" id="brand" required placeholder="e.g., Canon, Nikon">
                        </div>
                        <div class="input-group">
                            <label for="model">Model *</label>
                            <input type="text" id="model" required placeholder="e.g., AE-1 Program">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="type">Type *</label>
                            <select id="type" required>
                                <option value="" disabled selected>Select Type</option>
                                <option value="Film SLR">Film SLR</option>
                                <option value="Digital SLR">Digital SLR</option>
                                <option value="Mirrorless">Mirrorless</option>
                                <option value="Point & Shoot">Point & Shoot</option>
                                <option value="Medium Format">Medium Format</option>
                                <option value="Rangefinder">Rangefinder</option>
                                <option value="Polaroid/Instant">Polaroid/Instant</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="year">Production Year</label>
                            <input type="number" id="year" placeholder="e.g., 1981">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="format">Format</label>
                            <input type="text" id="format" placeholder="e.g., 35mm, APS-C">
                        </div>
                        <div class="input-group">
                            <label for="condition">Condition</label>
                            <input type="text" id="condition" placeholder="e.g., Mint, Used">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="notes">Notes</label>
                        <textarea id="notes" rows="3" placeholder="Condition details or specific history..."></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="btn-save-camera">
                            <span>Save Camera</span>
                            <div class="btn-spinner hidden"></div>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Image Upload Modal -->
    <div class="modal-overlay" id="image-modal">
        <div class="modal-content glass-panel upload-modal">
            <div class="modal-header">
                <h2>Upload Image</h2>
                <button class="btn-close" id="btn-close-image-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="upload-area" id="upload-area">
                    <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                    <h3>Drag & Drop your image here</h3>
                    <p>or</p>
                    <button class="btn-secondary" id="btn-browse-file">Browse Files</button>
                    <input type="file" id="file-input" accept="image/*" hidden>
                </div>
                <div id="upload-preview" class="upload-preview hidden">
                    <img id="preview-img" src="" alt="Preview">
                    <p id="file-name-display"></p>
                </div>

                <div class="form-actions mt-20">
                    <button class="btn-primary w-full" id="btn-confirm-upload" disabled>
                        <span>Upload to GCS</span>
                        <div class="btn-spinner hidden"></div>
                    </button>
                </div>
                <input type="hidden" id="upload-camera-id">
            </div>
        </div>
    </div>


    <script type="module" src="/static/app.js"></script>
</body>

</html>
