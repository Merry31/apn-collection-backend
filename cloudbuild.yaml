steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/apn-collection-api:$COMMIT_SHA', '.']

  # Step 2: Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/apn-collection-api:$COMMIT_SHA']

  # Step 3: Deploy the image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'apn-collection-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/apn-collection-api:$COMMIT_SHA'
      - '--region'
      - 'europe-west1' # Note: Update region if necessary
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated' # Remove if API should be private

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/apn-collection-api:$COMMIT_SHA'
